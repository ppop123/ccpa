host: ""
port: 8317

# Directory to store Claude OAuth tokens
auth-dir: "~/.ccpa"

# API keys for client authentication (clients use these to access this proxy)
api-keys:
  - "sk-replace-with-a-long-random-key"

# Maximum JSON request body size
body-limit: "200mb"

# Optional local per-API-key rate limiting for /v1 routes.
# Disabled by default to avoid throttling single-user local workflows.
rate-limit:
  enabled: false
  window-ms: 60000
  max-requests: 60

# Cloaking settings (masquerade as Claude Code CLI)
cloaking:
  mode: "auto"          # auto | always | never
  strict-mode: false    # true = only billing header + agent block in system prompt
  sensitive-words: []   # words to obfuscate with zero-width spaces
  cache-user-id: false  # cache fake user ID per API key
  billing-build-hash: "000"  # stable 3-hex cc_version suffix for billing header cloaking

# Upstream request timeouts
timeouts:
  messages-ms: 120000         # non-stream /v1/messages timeout
  stream-messages-ms: 600000  # stream /v1/messages timeout, suitable for Claude Code long tasks
  count-tokens-ms: 30000      # /v1/messages/count_tokens timeout

# Claude provider model IDs exposed by /v1/models and custom aliases routed to Claude.
# Keep these in config so new aliases and beta header changes do not require a code change.
claude:
  # Sent as Anthropic-Beta on Claude upstream requests.
  # Defaults to the Claude Code-compatible beta set used by this proxy.
  beta-header: "claude-code-20250219,oauth-2025-04-20,interleaved-thinking-2025-05-14,context-management-2025-06-27,prompt-caching-scope-2026-01-05"
  models:
    - "claude-opus-4-8"
    - "claude-opus-4-6"
    - "claude-sonnet-4-6"
    - "claude-haiku-4-5-20251001"
    - "claude-haiku-4-5"
    - "opus"
    - "sonnet"
    - "haiku"

# Codex provider settings
# Use `node dist/index.js --login-codex` or `npm run login:codex` to create the local Codex login state if needed.
codex:
  enabled: true
  auth-file: "~/.codex/auth.json"
  # Default request persistence for Codex upstream calls. Client `store` overrides this.
  store: false
  models:
    - "gpt-5.4"
    - "gpt-5.4-mini"
    - "gpt-5.2"
    - "gpt-image-2"

# Experimental Grok provider settings
# This reads the local SuperGrok OAuth state created by `grok login --oauth`.
# The official xAI API key flow is not required for this experimental adapter.
grok:
  enabled: false
  auth-file: "~/.grok/auth.json"
  base-url: "https://api.x.ai/v1"
  models:
    - "grok-4.20-0309-non-reasoning"
    - "grok-4.20-0309-reasoning"
    - "grok-4.20-multi-agent-0309"
    - "grok-4.3"
    - "grok-build-0.1"
    - "grok-imagine-image"
    - "grok-imagine-image-quality"

# Optional Agent Runs API.
# This is a higher-risk local/LAN execution surface: clients upload files, CCPA
# creates a temporary workspace, and a CLI agent runs only against that copy.
# Disabled by default. Do not expose it to untrusted networks.
agents:
  enabled: false
  runs-dir: "~/.ccpa/agent-runs"
  max-concurrency: 1
  max-runtime-ms: 600000
  sync-wait-ms: 30000
  max-files: 200
  max-file-bytes: 1048576
  max-total-bytes: 10485760
  keep-runs: 50
  runners:
    claude-code:
      enabled: true
      command: "claude"
    codex-cli:
      enabled: true
      command: "codex"
    grok-cli:
      enabled: true
      command: "grok"

# Debug logging level:
# off = no extra logs
# errors = upstream/network failure details
# verbose = errors + per-request access logs
debug: "off"
